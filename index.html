<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Logistics v4.2 - Made by Jaegh</title>
    <style>
        :root {
            --bg-main: #0f0f12; --bg-card: #1c1c21; --bg-input: #0a0a0c;
            --accent: #d4af37; --text: #e0e0e0; --text-dim: #888888;
            --border: #2d2d35; --success: #4caf50; --warning: #ff9800; --danger: #f44336;
            --hm-none: #444; --hm-low: #ffd700; --hm-high: #ff4500;
        }

        .light-theme {
            --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f9f9f9;
            --accent: #b5952f; --text: #1a1a1a; --text-dim: #666666;
            --border: #cccccc; --hm-none: #bbbbbb;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-main); color: var(--text); margin: 0; padding: 20px; font-size: 14px; transition: background 0.3s, color 0.3s; }
        
        .app-header { text-align: center; margin-bottom: 25px; }
        .app-title { color: var(--accent); margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .app-subtitle { color: var(--text-dim); font-size: 12px; margin-top: 5px; letter-spacing: 3px; font-weight: bold; }

        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .module { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .module-header { color: var(--accent); font-weight: bold; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        input, select { background: var(--bg-input); border: 1px solid var(--border); color: var(--accent); padding: 5px; border-radius: 2px; text-align: center; width: 95px; }
        input[type="checkbox"] { width: 20px; cursor: pointer; }
        
        .btn-stack { background: var(--accent); color: #000; border: none; padding: 4px 8px; font-size: 11px; border-radius: 2px; cursor: pointer; font-weight: bold; margin-left: 4px; transition: 0.2s; min-width: 60px; }
        .btn-stack:hover { filter: brightness(1.2); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-theme { background: var(--border); color: var(--text); width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--accent); cursor: pointer; font-weight: bold; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table td, .data-table th { padding: 6px 2px; border-bottom: 1px solid var(--border); text-align: center; }
        .data-table th { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: normal; }
        .data-table td:first-child { text-align: left; font-weight: bold; }
        .data-table input { width: 70px; }
        
        .logistics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .logistics-item { padding: 10px; background: var(--bg-input); border-radius: 4px; border-left: 4px solid var(--hm-none); display: flex; justify-content: space-between; align-items: center; }
        .hm-low { border-left-color: var(--hm-low); color: var(--hm-low); }
        .hm-high { border-left-color: var(--hm-high); color: var(--hm-high); font-weight: bold; }
        
        .step-card { background: var(--bg-input); padding: 10px; margin-bottom: 8px; border-left: 3px solid var(--accent); font-size: 13px; line-height: 1.5; }
        .highlight { color: var(--accent); font-weight: bold; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; color: var(--text); }
        
        .empty-msg { grid-column: span 2; text-align: center; padding: 20px; color: var(--success); font-weight: bold; font-size: 1.1em; }

        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-header">
    <h1 class="app-title">Quartermaster Command</h1>
    <div class="app-subtitle">STEEL LOGISTICS v4.2 • MADE BY JAEGH</div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div class="module">
            <div class="module-header" id="ui_interface">Interface</div>
            <div class="input-row">
                <select id="lang" onchange="changeLang()" style="width: 100%; margin-bottom: 10px;">
                    <option value="en">🇬🇧 English</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="pt">🇵🇹 Português</option>
                    <option value="de">🇩🇪 Deutsch</option>
                </select>
            </div>
            <button class="btn-theme" id="ui_themeToggle" onclick="toggleTheme()">☀️ / 🌙 Day/Night Mode</button>
            <div class="input-row"><label id="ui_format">Display Format</label>
                <select id="mode" onchange="handleModeChange()">
                    <option value="units" id="ui_optUnits">Units</option>
                    <option value="stacks" id="ui_optStacks">Stacks (10k)</option>
                </select>
            </div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_prodCmd">Production Command</div>
            <div class="input-row">
                <label id="ui_target">Target Steel</label>
                <div style="display:flex; gap: 5px;">
                    <input type="number" id="targetSteel" value="7000" oninput="run()">
                    <button class="btn-stack" id="ui_btnMax" onclick="calculateMax()" style="min-width: auto;">⚡ Max</button>
                </div>
            </div>
            <div class="input-row"><label id="ui_crafters">Crafters</label><input type="number" id="crafters" value="1" oninput="run()"></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_yieldMods">Yield Modifiers</div>
            <div class="input-row"><label id="ui_mastery">Mastery (+6%)</label><input type="checkbox" id="modMast" onchange="run()" checked></div>
            <div class="input-row"><label id="ui_refining">Refining (+3%)</label><input type="checkbox" id="modRef" onchange="run()" checked></div>
            <div class="input-row"><label id="ui_extraction">Extraction (+3%)</label><input type="checkbox" id="modExt" onchange="run()" checked></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_logStats">Logistics Stats</div>
            <div class="input-row"><span id="ui_totalStacksLabel">Total Gather Stacks:</span> <span id="statStacks" class="stat-val">0.00</span></div>
            <div class="input-row"><span id="ui_totalGoldLabel">Total Gold Cost:</span> <span id="statGold" class="stat-val" style="color:var(--accent);">0.00 g</span></div>
        </div>
        
        <button class="btn-stack" id="ui_btnDiscord" onclick="copyDiscord()" style="width:100%; padding:12px; font-size:13px; margin-bottom: 5px;">📋 Copy Discord Order</button>
        <button class="btn-stack btn-danger" id="ui_btnReset" onclick="clearAll()" style="width:100%; padding:8px;">🧹 Reset All Bank & Cart</button>
        <div id="saveStatus" style="text-align:center; margin-top:10px; font-size:11px; color:var(--text-dim);">Ready</div>
    </div>

    <div class="main">
        <div class="module">
            <div class="module-header"><span id="ui_invBank">Inventory Bank</span></div>
            <table class="data-table" id="bankTable"></table>
        </div>

        <div class="module">
            <div class="module-header"><span id="ui_marketCart">Market Cart (Raw Materials)</span> <button class="btn-stack" id="ui_btnAutoFill" onclick="autoFillCart()">🛒 Auto-Fill Missing</button></div>
            <table class="data-table" id="marketTable"></table>
        </div>

        <div class="module">
            <div class="module-header" id="ui_defGather">Deficit to Gather Manually</div>
            <div id="gatherOutput" class="logistics-grid"></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_mfgPipe">Manufacturing Pipeline</div>
            <div id="stepsOutput"></div>
        </div>
    </div>
</div>

<script>

            stepGrind: "Broyer", stepCrush: "Concasser", stepAttract: "Attirer", stepFurnace: "Fourneau", stepOven: "Four", stepFinal: "Fourneau Final:",
            stepTo: "en", stepYields: "produit", stepPlus: "+", perCrafter: "(Par Artisan)",
            resetPrompt: "Tout remettre à zéro ?", discHeader: "⚔️ ORDRE LOGISTIQUE : ACIER ⚔️", discLoad: "Stacks à Récolter :", discReq: "RÉCOLTE REQUISE :", discStock: "Aucune récolte requise.", discCopied: "Copié !",
            discMarket: "ACHATS AU MARCHÉ :",

        },

            prodCmd: "Producción", target: "Objetivo de Acero", btnMax: "⚡ Max", crafters: "Artesanos",
            yieldMods: "Modificadores", mastery: "Maestría (+6%)", refining: "Refinación (+3%)", extraction: "Extracción (+3%)",
            logStats: "Estadísticas", totalStacksLabel: "Stacks a Recolectar:", totalGoldLabel: "Costo Total:", btnDiscord: "📋 Copiar Discord",

            tblPrice: "Precio/10k", tblBuy: "Comprar", tblCost: "Costo (g)",
            noTarget: "Sin objetivo.", allCovered: "✅ ¡Todo cubierto!",
            items: { granum: "Granum", calx: "Calx", saburra: "Saburra", water: "Agua", sp: "Polvo Saburra", cp: "Polvo Calx", coal: "Carbón", coke: "Coque", pi: "Arrabio", gs: "Acero Grano", steel: "Acero", bo: "Mineral de Sangre" },
            stepGrind: "Moler", stepCrush: "Triturar", stepAttract: "Atraer", stepFurnace: "Horno", stepOven: "Horno Ref.", stepFinal: "Horno Final:",
            stepTo: "a", stepYields: "produce", stepPlus: "+", perCrafter: "(Por Artesano)",
            resetPrompt: "¿Restablecer todo a cero?", discHeader: "⚔️ ORDEN LOGÍSTICA: ACERO ⚔️", discLoad: "Stacks a Recolectar:", discReq: "RECOLECCIÓN REQUERIDA:", discStock: "No se requiere recolección.", discCopied: "¡Copiado!",

            invBank: "Banco", btnReset: "🧹 Zerar Tudo", defGather: "Déficit para Coletar", mfgPipe: "Fabricação", marketCart: "Mercado", btnAutoFill: "🛒 Comprar Faltante",
            tblPrice: "Preço/10k", tblBuy: "Comprar", tblCost: "Custo (g)",
            noTarget: "Nenhuma meta.", allCovered: "✅ Tudo coberto!",
            items: { granum: "Granum", calx: "Calx", saburra: "Saburra", water: "Água", sp: "Pó de Sab.", cp: "Pó de Calx", coal: "Carvão", coke: "Coque", pi: "Ferro-Gusa", gs: "Aço Grão", steel: "Aço", bo: "Minério de Sangue" },
            stepGrind: "Moer", stepCrush: "Triturar", stepAttract: "Atrair", stepFurnace: "Fornalha", stepOven: "Forno", stepFinal: "Forno Final:",
            stepTo: "para", stepYields: "produz", stepPlus: "+", perCrafter: "(Por Artesão)",
            resetPrompt: "Zerar tudo?", discHeader: "⚔️ ORDEM LOGÍSTICA: AÇO ⚔️", discLoad: "Stacks Coletar:", discReq: "COLETA NECESSÁRIA:", discStock: "Nenhuma coleta necessária.", discCopied: "Copiado!",
            discMarket: "COMPRAS NO MERCADO:",
            qAdd: "+10k", qAddStk: "+1 Stk"
        },
        de: {
            interface: "Schnittstelle", themeToggle: "☀️ / 🌙 Tag/Nacht-Modus", format: "Anzeigeformat", optUnits: "Einheiten", optStacks: "Stacks (10k)",
            prodCmd: "Produktion", target: "Ziel-Stahl", btnMax: "⚡ Max", crafters: "Handwerker",
            yieldMods: "Modifikatoren", mastery: "Meisterschaft (+6%)", refining: "Raffination (+3%)", extraction: "Extraktion (+3%)",
            logStats: "Statistiken", totalStacksLabel: "Sammel-Stacks:", totalGoldLabel: "Gesamtkosten:", btnDiscord: "📋 Für Discord kopieren",
            invBank: "Bank", btnReset: "🧹 Alles zurücksetzen", defGather: "Sammeldefizit", mfgPipe: "Herstellungsprozess", marketCart: "Markt", btnAutoFill: "🛒 Fehlende Kaufen",
            tblPrice: "Preis/10k", tblBuy: "Kaufen", tblCost: "Kosten (g)",
            noTarget: "Kein Ziel.", allCovered: "✅ Alles abgedeckt!",
            items: { granum: "Granum", calx: "Calx", saburra: "Saburra", water: "Wasser", sp: "Saburra-Pulver", cp: "Calx-Pulver", coal: "Kohle", coke: "Koks", pi: "Roheisen", gs: "Kornstahl", steel: "Stahl", bo: "Bluterz" },
            stepGrind: "Mahlen", stepCrush: "Zerkleinern", stepAttract: "Anziehen", stepFurnace: "Ofen", stepOven: "Raffinierofen", stepFinal: "Letzter Ofen:",
            stepTo: "zu", stepYields: "ergibt", stepPlus: "+", perCrafter: "(Pro Handwerker)",
            resetPrompt: "Alles auf null setzen?", discHeader: "⚔️ LOGISTIK-AUFTRAG: STAHL ⚔️", discLoad: "Sammel-Stacks:", discReq: "SAMMELN ERFORDERLICH:", discStock: "Kein Sammeln erforderlich.", discCopied: "Kopiert!",
            discMarket: "MARKTEINKÄUFE:",
            qAdd: "+10k", qAddStk: "+1 Stk"
        }
    };

    let timer = null;
    let prevMode = 'units';
    let currentLang = 'en';

    const itemKeys = ['granum', 'calx', 'saburra', 'water', 'sp', 'cp', 'coal', 'coke', 'pi', 'gs'];
    const rawKeys = ['granum', 'calx', 'saburra', 'water'];
    const defaultPrices = { granum: 15, calx: 35, saburra: 15, water: 1 };

    let pureDeficits = { granum: 0, calx: 0, saburra: 0, water: 0 }; // Used for Auto-Fill

    function changeLang() {
        currentLang = document.getElementById('lang').value;
        const t = i18n[currentLang];
        
        ['interface', 'themeToggle', 'format', 'optUnits', 'optStacks', 'prodCmd', 'target', 'btnMax', 'crafters', 'yieldMods', 'mastery', 'refining', 'extraction', 'logStats', 'totalStacksLabel', 'totalGoldLabel', 'btnDiscord', 'invBank', 'btnReset', 'defGather', 'mfgPipe', 'marketCart', 'btnAutoFill'].forEach(id => {
            let el = document.getElementById('ui_' + id);
            if(el) el.innerText = t[id];
        });
        
        renderBankTable();
        renderMarketTable();
        updateButtonLabels();
        run();
    }

    function renderBankTable() {
        const table = document.getElementById('bankTable');
        const t = i18n[currentLang];
        const mode = document.getElementById('mode').value;
        const label = mode === 'stacks' ? t.qAddStk : t.qAdd;
        
        const currentVals = {};
        itemKeys.forEach(k => {
            const el = document.getElementById('b_' + k);
            if (el) currentVals[k] = el.value;
        });

        table.innerHTML = ""; 
        itemKeys.forEach(k => {
            const val = currentVals[k] || 0;
            table.innerHTML += `<tr>
                <td style="width:25%">${t.items[k]}</td>
                <td style="text-align:right">
                    <input type="number" id="b_${k}" value="${val}" oninput="run()">
                    <button class="btn-stack q-add" id="btn_${k}" onclick="quickAdd('b_${k}')">${label}</button>
                </td>
            </tr>`;
        });
    }

    function renderMarketTable() {
        const table = document.getElementById('marketTable');
        const t = i18n[currentLang];
        
        const currentVals = {};
        rawKeys.forEach(k => {
            const pEl = document.getElementById('p_' + k);
            const cEl = document.getElementById('buy_' + k);
            currentVals['p_'+k] = pEl ? pEl.value : defaultPrices[k];
            currentVals['buy_'+k] = cEl ? cEl.value : 0;
        });

        table.innerHTML = `<tr><th></th><th>${t.tblPrice}</th><th>${t.tblBuy}</th><th style="text-align:right">${t.tblCost}</th></tr>`; 
        rawKeys.forEach(k => {
            table.innerHTML += `<tr>
                <td style="width:25%">${t.items[k]}</td>
                <td><input type="number" id="p_${k}" value="${currentVals['p_'+k]}" oninput="run()" style="width:50px"></td>
                <td><input type="number" id="buy_${k}" value="${currentVals['buy_'+k]}" oninput="run()"></td>
                <td style="text-align:right; font-weight:bold; color:var(--accent);" id="cost_${k}">0.00</td>
            </tr>`;
        });
    }

    function init() {
        renderBankTable();
        renderMarketTable();
        load(); 
        document.getElementById('lang').value = currentLang;
        changeLang(); 
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        save();
    }

    function updateButtonLabels() {
        const mode = document.getElementById('mode').value;
        const t = i18n[currentLang];
        const label = mode === 'stacks' ? t.qAddStk : t.qAdd;
        document.querySelectorAll('.q-add').forEach(btn => btn.innerText = label);
    }

    function quickAdd(id) {
        const el = document.getElementById(id);
        const mode = document.getElementById('mode').value;
        let current = Number(el.value) || 0;
        el.value = mode === 'stacks' ? parseFloat((current + 1).toFixed(4)) : current + 10000;
        run();
    }

    function clearAll() {
        const t = i18n[currentLang];
        if(confirm(t.resetPrompt)) {
            itemKeys.forEach(k => {
                const el = document.getElementById('b_' + k);
                if(el) el.value = 0;
            });
            rawKeys.forEach(k => {
                const el = document.getElementById('buy_' + k);
                if(el) el.value = 0;
            });
            document.getElementById('targetSteel').value = 0;
            run();
        }
    }

    function autoFillCart() {
        const mode = document.getElementById('mode').value;
        const mult = mode === 'stacks' ? 10000 : 1;
        
        rawKeys.forEach(k => {
            let needed = pureDeficits[k] || 0;
            let val = mode === 'stacks' ? (needed / 10000).toFixed(4) : needed;
            document.getElementById('buy_' + k).value = val;
        });
        run();
    }

    function handleModeChange() {
        const mode = document.getElementById('mode').value;
        const targetEl = document.getElementById('targetSteel');
        let targetVal = Number(targetEl.value) || 0;
        
        if (prevMode === 'units' && mode === 'stacks') targetEl.value = (targetVal / 10000).toFixed(4);
        else if (prevMode === 'stacks' && mode === 'units') targetEl.value = Math.round(targetVal * 10000);

        // Convert Bank
        itemKeys.forEach(k => {
            const el = document.getElementById('b_' + k);
            if(el) {
                let val = Number(el.value) || 0;
                if (prevMode === 'units' && mode === 'stacks') el.value = (val / 10000).toFixed(4);
                else if (prevMode === 'stacks' && mode === 'units') el.value = Math.round(val * 10000);
            }
        });

        // Convert Cart Buy Amounts
        rawKeys.forEach(k => {
            const el = document.getElementById('buy_' + k);
            if(el) {
                let val = Number(el.value) || 0;
                if (prevMode === 'units' && mode === 'stacks') el.value = (val / 10000).toFixed(4);
                else if (prevMode === 'stacks' && mode === 'units') el.value = Math.round(val * 10000);
            }
        });

        updateButtonLabels();
        prevMode = mode;
        run();
    }

    function run() { clearTimeout(timer); timer = setTimeout(calculate, 150); }

    function runEngine(targetRaw, bankData, mode) {
        const mult = mode === 'stacks' ? 10000 : 1;
        const target = targetRaw * mult;
        
        const mR = document.getElementById('modRef').checked ? 1.03 : 1;
        const mE = document.getElementById('modExt').checked ? 1.03 : 1;
        const mM = document.getElementById('modMast').checked ? 1.06 : 1;

        const rGS = Math.ceil(target / (0.7 * mR));
        const coalForSteel = Math.ceil(rGS * 0.5);
        const spForSteel = Math.ceil(rGS * 0.5);
        const diffGS = Math.max(0, rGS - bankData.gs);

        const rPI = Math.ceil(diffGS / (0.7 * mR));
        const cokeForGS = Math.ceil(rPI * 0.5);
        const cpForGS = Math.ceil(rPI * 0.5);
        const diffPI = Math.max(0, rPI - bankData.pi);

        const rBlood = Math.ceil(diffPI / (0.4 * mR));
        const cokeForPI = Math.ceil(rBlood * 0.0385);
        
        const totalCoke = cokeForGS + cokeForPI;
        const diffCoke = Math.max(0, totalCoke - bankData.coke);

        const coalForCoke = Math.ceil(diffCoke / (0.72 * mR));
        const cpForCoke = Math.ceil(coalForCoke * 0.0715);

        const totalCoal = coalForSteel + coalForCoke;
        const diffCoal = Math.max(0, totalCoal - bankData.coal);

        const rGranum = Math.ceil(rBlood / (0.198 * mE * mM));
        const cpForBlood = Math.ceil(rGranum * 0.0715);

        const totalCP = cpForGS + cpForCoke + cpForBlood;
        const diffCP = Math.max(0, totalCP - bankData.cp);

        const diffSP = Math.max(0, spForSteel - bankData.sp);

        const rSaburra = Math.ceil(diffSP / (0.4275 * mE));
        const waterForSaburra = Math.ceil(rSaburra * 0.1);

        const calxToGrind = Math.ceil(diffCP / (0.2058 * mE));
        const waterForCalx = Math.ceil(calxToGrind * 0.1);
        const coalFromGrind = Math.ceil(calxToGrind * 0.1140 * mE);

        const extraCoal = Math.max(0, diffCoal - coalFromGrind);
        const calxToCrush = Math.ceil(extraCoal / (0.2160 * mE));

        const rCalx = calxToGrind + calxToCrush;
        const rWater = waterForSaburra + waterForCalx;

        return {
            granum: Math.max(0, rGranum - bankData.granum),
            calx: Math.max(0, rCalx - bankData.calx),
            saburra: Math.max(0, rSaburra - bankData.saburra),
            water: Math.max(0, rWater - bankData.water),
            reqGS: rGS, coalForSteel, spForSteel, diffGS,
            rPI, cokeForGS, cpForGS, diffPI,
            rBlood, cokeForPI, diffCoke,
            coalForCoke, cpForCoke, diffCoal,
            rGranum, cpForBlood, diffCP,
            diffSP, rSaburra, waterForSaburra,
            calxToGrind, waterForCalx, coalFromGrind,
            extraCoal, calxToCrush, target
        };
    }

    function calculateMax() {
        const mode = document.getElementById('mode').value;
        const mult = mode === 'stacks' ? 10000 : 1;
        const getB = (id) => (Number(document.getElementById('b_' + id).value) || 0) * mult;
        const bank = {}; itemKeys.forEach(k => bank[k] = getB(k));

        let low = 0, high = 1000000 * mult, maxPossible = 0;
        while(low <= high) {
            let mid = Math.floor((low + high) / 2);
            let res = runEngine(mid / mult, bank, mode);
            
            if (res.granum <= 0) { maxPossible = mid; low = mid + 1; } 
            else { high = mid - 1; }
        }
        document.getElementById('targetSteel').value = mode === 'stacks' ? parseFloat((maxPossible / 10000).toFixed(4)) : maxPossible;
        run();
    }

    function calculate() {
        const mode = document.getElementById('mode').value;
        const t = i18n[currentLang];
        const targetRaw = Number(document.getElementById('targetSteel').value) || 0;
        const crafters = Math.max(1, Number(document.getElementById('crafters').value));
        
        const mult = mode === 'stacks' ? 10000 : 1;
        const getB = (id) => (Number(document.getElementById('b_' + id).value) || 0) * mult;
        const bank = {}; itemKeys.forEach(k => bank[k] = getB(k));

        // Wipe UI if 0
        if (targetRaw <= 0) {
            document.getElementById('gatherOutput').innerHTML = `<div class="empty-msg">${t.noTarget}</div>`;
            document.getElementById('stepsOutput').innerHTML = "";
            document.getElementById('statStacks').innerText = "0.00";
            document.getElementById('statGold').innerText = "0.00 g";
            rawKeys.forEach(k => document.getElementById('cost_' + k).innerText = "0.00");
            save(); return;
        }

        const res = runEngine(targetRaw, bank, mode);
        
        // Save pure deficits globally so the Auto-Fill button knows what to do
        pureDeficits = { granum: res.granum, calx: res.calx, saburra: res.saburra, water: res.water };
        
        // Process Market Cart Data
        let totalGold = 0;
        let purchased = {};
        
        rawKeys.forEach(k => {
            const price = Number(document.getElementById('p_' + k).value) || 0;
            const buyQtyRaw = Number(document.getElementById('buy_' + k).value) || 0;
            const buyQtyUnits = buyQtyRaw * mult;
            
            purchased[k] = buyQtyUnits;
            
            const cost = (buyQtyUnits / 10000) * price;
            totalGold += cost;
            document.getElementById('cost_' + k).innerText = cost > 0 ? cost.toFixed(2) : "0.00";
        });

        document.getElementById('statGold').innerText = totalGold.toFixed(2) + " g";

        // Calculate Manual Gather (Deficit minus Purchased)
        const gather = { 
            granum: Math.max(0, res.granum - purchased.granum), 
            calx: Math.max(0, res.calx - purchased.calx), 
            saburra: Math.max(0, res.saburra - purchased.saburra), 
            water: Math.max(0, res.water - purchased.water) 
        };

        let gHTML = '';
        let hasDeficit = false;
        let totalUnits = 0;

        Object.keys(gather).forEach(k => {
            if (gather[k] > 0) {
                totalUnits += gather[k];
                const fmtVal = mode === 'stacks' ? (gather[k]/10000).toFixed(2) + " Stk" : gather[k].toLocaleString();
                const hm = gather[k] < 10000 ? 'hm-low' : 'hm-high';
                gHTML += `<div class="logistics-item ${hm}"><span>${t.items[k]}</span><span>${fmtVal}</span></div>`;
                hasDeficit = true;
            }
        });
        document.getElementById('gatherOutput').innerHTML = hasDeficit ? gHTML : `<div class="empty-msg">${t.allCovered}</div>`;

        const totalStacks = (totalUnits / 10000).toFixed(2);
        document.getElementById('statStacks').innerText = totalStacks;

        // Render Steps
        const s = (v) => Math.ceil(v / crafters).toLocaleString();
        let steps = [];
        const perCr = crafters > 1 ? ` <span style="color:var(--warning); font-size:0.8em;">${t.perCrafter}</span>` : "";

        if (res.rSaburra > 0) steps.push(`${t.stepGrind} <span class="highlight">${s(res.rSaburra)} ${t.items.saburra}</span> ${t.stepPlus} <span class="highlight">${s(res.waterForSaburra)} ${t.items.water}</span> ${t.stepTo} ${t.items.sp}`);
        if (res.calxToGrind > 0) steps.push(`${t.stepGrind} <span class="highlight">${s(res.calxToGrind)} ${t.items.calx}</span> ${t.stepPlus} <span class="highlight">${s(res.waterForCalx)} ${t.items.water}</span> ${t.stepYields} <span class="highlight">${s(res.diffCP)} ${t.items.cp}</span> ${t.stepPlus} <span class="highlight">${s(res.coalFromGrind)} ${t.items.coal}</span>`);
        if (res.calxToCrush > 0) steps.push(`${t.stepCrush} <span class="highlight">${s(res.calxToCrush)} ${t.items.calx}</span> ${t.stepYields} <span class="highlight">${s(res.extraCoal)} ${t.items.coal}</span>`);
        if (res.rGranum > 0) steps.push(`${t.stepAttract}: <span class="highlight">${s(res.rGranum)} ${t.items.granum}</span> ${t.stepPlus} <span class="highlight">${s(res.cpForBlood)} ${t.items.cp}</span> ${t.stepYields} <span class="highlight">${s(res.rBlood)} ${t.items.bo}</span>`);
        if (res.diffCoke > 0) steps.push(`${t.stepFurnace}: <span class="highlight">${s(res.coalForCoke)} ${t.items.coal}</span> ${t.stepPlus} <span class="highlight">${s(res.cpForCoke)} ${t.items.cp}</span> ${t.stepYields} <span class="highlight">${s(res.diffCoke)} ${t.items.coke}</span>`);
        if (res.diffPI > 0) steps.push(`${t.stepFurnace}: <span class="highlight">${s(res.rBlood)} ${t.items.bo}</span> ${t.stepPlus} <span class="highlight">${s(res.cokeForPI)} ${t.items.coke}</span> ${t.stepYields} <span class="highlight">${s(res.diffPI)} ${t.items.pi}</span>`);
        if (res.diffGS > 0) steps.push(`${t.stepOven}: <span class="highlight">${s(res.diffPI)} ${t.items.pi}</span> ${t.stepPlus} <span class="highlight">${s(res.cokeForGS)} ${t.items.coke}</span> ${t.stepPlus} <span class="highlight">${s(res.cpForGS)} ${t.items.cp}</span> ${t.stepYields} <span class="highlight">${s(res.diffGS)} ${t.items.gs}</span>`);
        steps.push(`${t.stepFinal} <span class="highlight">${s(res.reqGS)} ${t.items.gs}</span> ${t.stepPlus} <span class="highlight">${s(res.coalForSteel)} ${t.items.coal}</span> ${t.stepPlus} <span class="highlight">${s(res.spForSteel)} ${t.items.sp}</span> ${t.stepYields} <span class="highlight">${(targetRaw * mult).toLocaleString()} ${t.items.steel}</span>`);
        
        document.getElementById('stepsOutput').innerHTML = steps.map(text => `<div class="step-card">${text}${perCr}</div>`).join('');
        save();
    }

    function save() {
        const data = {};
        document.querySelectorAll('input:not([type="checkbox"]), select').forEach(el => data[el.id] = el.value);
        document.querySelectorAll('input[type="checkbox"]').forEach(el => data[el.id] = el.checked);
        data.theme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
        data.lang = currentLang;
        localStorage.setItem('QM_Steel_v4.2', JSON.stringify(data));
        document.getElementById('saveStatus').innerText = `Saved: ${new Date().toLocaleTimeString()}`;
    }

    function load() {
        const d = JSON.parse(localStorage.getItem('QM_Steel_v4.2'));
        if (!d) return;
        Object.keys(d).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if(el.type === 'checkbox') el.checked = d[id];
                else el.value = d[id];
            }
        });
        if (d.theme === 'light') document.body.classList.add('light-theme');
        if (d.lang) currentLang = d.lang;
        prevMode = document.getElementById('mode').value || 'units';
    }

    function copyDiscord() {
        const t = i18n[currentLang];
        const mode = document.getElementById('mode').value;
        const mult = mode === 'stacks' ? 10000 : 1;
        
        // Manual Gather Formatting
        let msg = `**${t.discHeader}**\n\n`;
        
        // Market Formatting
        let marketString = "";
        let hasMarket = false;
        rawKeys.forEach(k => {
            let buyRaw = Number(document.getElementById('buy_'+k).value) || 0;
            if (buyRaw > 0) {
                let fmtAmt = mode === 'stacks' ? buyRaw.toFixed(2) + " Stacks" : (buyRaw).toLocaleString();
                marketString += `- ${t.items[k]}: ${fmtAmt}\n`;
                hasMarket = true;
            }
        });

        if (hasMarket) {
            msg += `**${t.discMarket}**\n\`\`\`\n${marketString}\nTotal Budget: ${document.getElementById('statGold').innerText}\n\`\`\`\n`;
        }

        const stacks = document.getElementById('statStacks').innerText;
        msg += `**${t.discReq}**\n\`\`\`\n`;
        const items = document.querySelectorAll('.logistics-item');
        if (items.length === 0) msg += `${t.discStock}\n`;
        items.forEach(el => msg += `- ${el.innerText.replace('\n', ': ')}\n`);
        msg += `\nTotal: ${stacks} Stacks to Gather\`\`\``;
        
        navigator.clipboard.writeText(msg);
        alert(t.discCopied);
    }

    window.onload = init;
</script>
