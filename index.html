<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartermaster Steel Logistics Suite</title>
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-main: #1e1e24;
            --bg-container: #2b2b36;
            --text-main: #f5f5f5;
            --accent: #d4af37;
            --accent-hover: #b5952f;
            --border-color: #3a3a48;
            --bg-input: #1e1e24;
            --bg-box: #3a3a48;
            --bg-step: #23232c;
            --bg-cost: #2a2a1e;
            --text-dim: #a9a9b3;
            --text-value: #e0e0e0;
            --success: #4CAF50;
            --warning: #ff9800;
        }

        .light-theme {
            /* Light Theme */
            --bg-main: #f0f2f5;
            --bg-container: #ffffff;
            --text-main: #333333;
            --accent: #b5952f;
            --accent-hover: #8f7524;
            --border-color: #cccccc;
            --bg-input: #f9f9f9;
            --bg-box: #e9ecef;
            --bg-step: #f8f9fa;
            --bg-cost: #fff8e1;
            --text-dim: #666666;
            --text-value: #111111;
            --success: #2e7d32;
            --warning: #e65100;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background-color: var(--bg-container);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            position: relative;
            transition: background-color 0.3s;
        }
        h1, h2, h3 { color: var(--accent); }
        h1 { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 30px;}
        
        .header-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        .header-btn, .header-select {
            background-color: var(--accent);
            color: #1e1e24;
            border: none;
            padding: 8px 12px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            outline: none;
        }
        .header-btn:hover, .header-select:hover { background-color: var(--accent-hover); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        .input-group label { font-size: 1.1em; margin-bottom: 8px; font-weight: bold; }
        
        .main-inputs select {
            font-size: 1.2em;
            padding: 8px;
            text-align: center;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 2px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
            width: 220px;
            transition: background-color 0.3s, color 0.3s;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border: 2px solid var(--accent);
            border-radius: 5px;
            overflow: hidden;
            transition: background-color 0.3s;
        }
        .input-wrapper input[type="number"] {
            font-size: 1.5em;
            padding: 8px;
            width: 100%;
            text-align: center;
            background-color: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
            -moz-appearance: textfield;
            transition: color 0.3s;
        }
        .input-wrapper input[type="number"]::-webkit-outer-spin-button,
        .input-wrapper input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-suffix {
            color: var(--text-dim);
            padding-right: 15px;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .bonus-toggles {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background-color: var(--bg-cost);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            transition: background-color 0.3s;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 10px;
            font-size: 1em;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            background-color: var(--bg-step);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
            align-items: center;
        }
        .inv-header {
            font-weight: bold;
            color: var(--text-dim);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .inv-label { font-weight: bold; text-align: right; padding-right: 15px; }
        .inv-cell { display: flex; justify-content: center; align-items: center; gap: 5px; }
        .inv-cell input {
            width: 90px;
            font-size: 1.1em;
            padding: 6px;
            text-align: center;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--accent);
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .gold-symbol { color: var(--accent); font-weight: bold; }

        .intermediate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            background-color: var(--bg-step);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
            align-items: center;
        }
        @media (max-width: 650px) {
            .intermediate-grid { grid-template-columns: 1fr 1fr; }
        }

        .summary-box {
            background-color: var(--bg-box);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            gap: 10px;
            transition: background-color 0.3s;
        }
        .summary-col { text-align: center; display: flex; flex-direction: column; gap: 5px; }
        .req-val { font-size: 1.2em; font-weight: bold; color: var(--text-main); }
        .bank-val { font-size: 1em; color: var(--warning); }
        .def-val { font-size: 1.3em; font-weight: bold; color: var(--success); }
        .mat-label { font-weight: bold; text-transform: uppercase; font-size: 0.9em; color: var(--text-dim); margin-top: 5px;}
        
        .cost-box {
            background-color: var(--bg-cost);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            border-left: 4px solid var(--accent);
            transition: background-color 0.3s;
        }
        .cost-item { text-align: center; margin: 10px; min-width: 150px; }
        .cost-value { font-size: 1.5em; font-weight: bold; color: var(--text-value); transition: color 0.3s;}

        .steps { line-height: 1.8; margin-bottom: 30px; }
        .step-card {
            background-color: var(--bg-step);
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .highlight { color: var(--accent); font-weight: bold; }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn-action {
            background-color: var(--accent);
            color: #1e1e24;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-action:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-action:active { transform: translateY(0); }
    </style>
</head>

<div class="container">
    <div class="header-controls">
        <select class="header-select" id="langSelect" onchange="changeLanguage()">
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
            <option value="pt">PT</option>
            <option value="de">DE</option>
        </select>
        <button class="header-btn" onclick="toggleTheme()" id="themeBtn">☀️/🌙</button>
    </div>

    <h1 id="mainTitle">Steel Logistics Suite</h1>

    <div class="controls main-inputs">
        <div class="input-group">
            <label for="steelInput" id="inputLabel">Target Steel Yield:</label>
            <div style="display: flex; gap: 8px; align-items: stretch;">
                <div class="input-wrapper" style="width: 180px;">
                    <input type="number" id="steelInput" value="7000" min="0" step="any" oninput="calculate()">
                    <span id="inputSuffix1" class="input-suffix">Units</span>
                </div>
                <button class="header-btn" onclick="calculateMaxFromBank()" id="btnMax" title="Calculate Max Steel from Bank" style="padding: 0 15px;">⚡ Max</button>
            </div>
        </div>
        
        <div class="input-group">
            <label for="displayMode" id="displayLabel">Input/Display Format:</label>
            <select id="displayMode" onchange="handleModeChange()">
                <option value="units" id="optUnits">Units</option>
                <option value="stacks" id="optStacks">Stacks (10k)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="crafterCount" id="crafterLabel">Number of Crafters:</label>
            <div class="input-wrapper" style="width: 150px;">
                <input type="number" id="crafterCount" value="1" min="1" step="1" oninput="calculate()">
            </div>
        </div>
    </div>

    <h3 id="bonusTitle" style="text-align: center; margin-top: 0;">Yield Bonuses</h3>
    <div class="bonus-toggles">
        <label class="checkbox-group">
            <input type="checkbox" id="chkMastery" onchange="calculate()">
            <span id="lblMastery">Ore Extraction Mastery (+6%)</span>
        </label>
        <label class="checkbox-group">
            <input type="checkbox" id="chkExtract" onchange="calculate()">
            <span id="lblExtract">Extraction Bonus (+3%)</span>
        </label>
        <label class="checkbox-group">
            <input type="checkbox" id="chkRefine" onchange="calculate()">
            <span id="lblRefine">Refining Bonus (+3%)</span>
        </label>
    </div>

    <h2 id="marketTitle">Raw Materials Bank & Market</h2>
    <div class="inventory-grid">
        <div class="inv-header" id="hdrRes">Resource</div>
        <div class="inv-header" id="hdrPrice">Price (g/10k)</div>
        <div class="inv-header" id="hdrBank">In Bank</div>

        <div class="inv-label">Granum</div>
        <div class="inv-cell"><input type="number" id="priceGranum" value="15" min="0" step="0.1" oninput="calculate()"><span class="gold-symbol">g</span></div>
        <div class="inv-cell"><input type="number" id="bankGranum" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>

        <div class="inv-label">Calx</div>
        <div class="inv-cell"><input type="number" id="priceCalx" value="35" min="0" step="0.1" oninput="calculate()"><span class="gold-symbol">g</span></div>
        <div class="inv-cell"><input type="number" id="bankCalx" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>

        <div class="inv-label">Saburra</div>
        <div class="inv-cell"><input type="number" id="priceSaburra" value="15" min="0" step="0.1" oninput="calculate()"><span class="gold-symbol">g</span></div>
        <div class="inv-cell"><input type="number" id="bankSaburra" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>

        <div class="inv-label" id="lblWater">Water</div>
        <div class="inv-cell"><input type="number" id="priceWater" value="1" min="0" step="0.1" oninput="calculate()"><span class="gold-symbol">g</span></div>
        <div class="inv-cell"><input type="number" id="bankWater" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
    </div>

    <h2 id="intBankTitle">Intermediate Components Bank</h2>
    <div class="intermediate-grid">
        <div class="inv-label">Saburra Powder</div>
        <div class="inv-cell"><input type="number" id="bankSabPowder" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
        
        <div class="inv-label">Calx Powder</div>
        <div class="inv-cell"><input type="number" id="bankCalxPowder" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
        
        <div class="inv-label">Coal</div>
        <div class="inv-cell"><input type="number" id="bankCoal" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
        
        <div class="inv-label">Coke</div>
        <div class="inv-cell"><input type="number" id="bankCoke" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
        
        <div class="inv-label">Pig Iron</div>
        <div class="inv-cell"><input type="number" id="bankPigIron" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
        
        <div class="inv-label">Grain Steel</div>
        <div class="inv-cell"><input type="number" id="bankGrainSteel" class="bank-input" value="0" min="0" step="any" oninput="calculate()"><span class="inputSuffix2 text-dim"></span></div>
    </div>

    <h2 id="rawTitle">Logistics: Raw Materials to Gather</h2>
    <div class="summary-box" id="rawMaterials">
        </div>
    
    <div class="cost-box" id="costSummary">
        </div>

    <h2 id="stepsTitle">Step-by-Step Instructions</h2>
    <div class="steps" id="stepList">
        </div>

    <div class="action-buttons">
        <button class="btn-action" onclick="copyToDiscord()" id="btnDiscord">📋 Copy for Discord</button>
        <button class="btn-action" onclick="exportCSV()" id="btnCsv">📊 Export CSV</button>
    </div>
</div>

    let lastCalcData = {};

    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    function changeLanguage() {
        currentLang = document.getElementById('langSelect').value;
        const t = text[currentLang];
        
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('inputLabel').innerText = t.input;
        document.getElementById('displayLabel').innerText = t.display;
        document.getElementById('crafterLabel').innerText = t.crafterLabel;
        document.getElementById('optUnits').innerText = t.optUnits;
        document.getElementById('optStacks').innerText = t.optStacks;
        document.getElementById('btnMax').innerText = t.btnMax;
        document.getElementById('bonusTitle').innerText = t.bonusTitle;
        document.getElementById('lblMastery').innerText = t.lblMastery;
        document.getElementById('lblExtract').innerText = t.lblExtract;
        document.getElementById('lblRefine').innerText = t.lblRefine;
        document.getElementById('marketTitle').innerText = t.marketTitle;
        document.getElementById('intBankTitle').innerText = t.intBankTitle;
        document.getElementById('hdrRes').innerText = t.hdrRes;
        document.getElementById('hdrPrice').innerText = t.hdrPrice;
        document.getElementById('hdrBank').innerText = t.hdrBank;
        document.getElementById('rawTitle').innerText = t.rawTitle;
        document.getElementById('stepsTitle').innerText = t.stepsTitle;
        document.getElementById('lblWater').innerText = t.water;
        document.getElementById('btnDiscord').innerText = t.btnDiscord;
        document.getElementById('btnCsv').innerText = t.btnCsv;

        updateInputSuffixes();
        calculate();
    }

    function updateInputSuffixes() {
        const mode = document.getElementById('displayMode').value;
        const t = text[currentLang];
        const suffix = mode === 'stacks' ? t.stackShort : t.optUnits;
        
        document.getElementById('inputSuffix1').innerText = suffix;
        const bankSuffixes = document.querySelectorAll('.inputSuffix2');
        bankSuffixes.forEach(el => el.innerText = suffix);
    }

    function handleModeChange() {
        const newMode = document.getElementById('displayMode').value;
        const inputsToConvert = [
            'steelInput', 'bankGranum', 'bankCalx', 'bankSaburra', 'bankWater', 
            'bankSabPowder', 'bankCalxPowder', 'bankCoal', 'bankCoke', 'bankPigIron', 'bankGrainSteel'
        ];
        
        inputsToConvert.forEach(id => {
            const el = document.getElementById(id);
            let val = Number(el.value) || 0;
            if (previousMode === 'units' && newMode === 'stacks') val = val / 10000;
            else if (previousMode === 'stacks' && newMode === 'units') val = val * 10000;
            el.value = val === 0 ? "0" : parseFloat(val.toFixed(4));
        });
        
        previousMode = newMode;
        updateInputSuffixes();
        calculate();
    }

    function formatAmount(num) {
        const mode = document.getElementById('displayMode').value;
        const t = text[currentLang];
        if (mode === 'stacks') return (num / 10000).toFixed(2) + " " + t.stackShort;
        return num.toLocaleString();
    }

    function getCalculations(desiredSteel) {
        const mode = document.getElementById('displayMode').value;
        const getBank = (id) => mode === 'stacks' ? (Number(document.getElementById(id).value)||0) * 10000 : (Number(document.getElementById(id).value)||0);
        
        const bGranum = getBank('bankGranum');
        const bCalx = getBank('bankCalx');
        const bSaburra = getBank('bankSaburra');
        const bWater = getBank('bankWater');
        const bSabPowder = getBank('bankSabPowder');
        const bCalxPowder = getBank('bankCalxPowder');
        const bCoal = getBank('bankCoal');
        const bCoke = getBank('bankCoke');
        const bPigIron = getBank('bankPigIron');
        const bGrainSteel = getBank('bankGrainSteel');

        const multExt = document.getElementById('chkExtract').checked ? 1.03 : 1;
        const multRef = document.getElementById('chkRefine').checked ? 1.03 : 1;
        const multMast = document.getElementById('chkMastery').checked ? 1.06 : 1;

        // Baking Steel
        const reqGrainSteelToBake = Math.ceil(desiredSteel / (0.7 * multRef));
        const coalForSteel = Math.ceil(reqGrainSteelToBake * 0.5);
        const saburraPowderForSteel = Math.ceil(reqGrainSteelToBake * 0.5);

        const grainSteelToCraft = Math.max(0, reqGrainSteelToBake - bGrainSteel);

        // Baking Grain Steel
        const reqPigIronToBake = Math.ceil(grainSteelToCraft / (0.7 * multRef));
        const cokeForGS = Math.ceil(reqPigIronToBake * 0.5);
        const calxPowderForGS = Math.ceil(reqPigIronToBake * 0.5);

        const pigIronToCraft = Math.max(0, reqPigIronToBake - bPigIron);

        // Smelting Pig Iron
        const reqBloodOreToSmelt = Math.ceil(pigIronToCraft / (0.4 * multRef));
        const cokeForPI = Math.ceil(reqBloodOreToSmelt * 0.0385);

        const totalCokeNeeded = cokeForGS + cokeForPI;
        const cokeToCraft = Math.max(0, totalCokeNeeded - bCoke);

        // Furnacing Coke
        const coalForCoke = Math.ceil(cokeToCraft / (0.72 * multRef));
        const calxPowderForCoke = Math.ceil(coalForCoke * 0.0715);

        const totalCoalNeeded = coalForSteel + coalForCoke;
        const coalToCraft = Math.max(0, totalCoalNeeded - bCoal);

        // Attracting Blood Ore
        const reqGranum = Math.ceil(reqBloodOreToSmelt / (0.198 * multExt * multMast));
        const calxPowderForBloodOre = Math.ceil(reqGranum * 0.0715);

        const totalCalxPowderNeeded = calxPowderForGS + calxPowderForCoke + calxPowderForBloodOre;
        const calxPowderToCraft = Math.max(0, totalCalxPowderNeeded - bCalxPowder);

        const totalSaburraPowderNeeded = saburraPowderForSteel;
        const saburraPowderToCraft = Math.max(0, totalSaburraPowderNeeded - bSabPowder);

        // Grinding Saburra
        const reqSaburra = Math.ceil(saburraPowderToCraft / (0.4275 * multExt));
        const waterForSaburra = Math.ceil(reqSaburra * 0.10);

        // Grinding Calx
        const calxToGrind = Math.ceil(calxPowderToCraft / (0.2058 * multExt));
        const waterForCalx = Math.ceil(calxToGrind * 0.10);
        
        const coalFromGrinding = Math.ceil(calxToGrind * 0.1140 * multExt);
        const extraCoalNeeded = Math.max(0, coalToCraft - coalFromGrinding);
        
        // Crushing Calx
        const calxToCrush = Math.ceil(extraCoalNeeded / (0.2160 * multExt));
        
        const reqCalx = calxToGrind + calxToCrush;
        const reqWater = waterForSaburra + waterForCalx;

        const defGranum = Math.max(0, reqGranum - bGranum);
        const defCalx = Math.max(0, reqCalx - bCalx);
        const defSaburra = Math.max(0, reqSaburra - bSaburra);
        const defWater = Math.max(0, reqWater - bWater);

        return {
            bGranum, bCalx, bSaburra, bWater,
            reqGranum, reqCalx, reqSaburra, reqWater,
            defGranum, defCalx, defSaburra, defWater,
            saburraPowderToCraft, waterForSaburra, calxToGrind, waterForCalx,
            calxPowderToCraft, coalFromGrinding, calxToCrush, extraCoalNeeded,
            calxPowderForBloodOre, reqBloodOreToSmelt, coalForCoke, calxPowderForCoke,
            cokeToCraft, cokeForPI, pigIronToCraft, cokeForGS, calxPowderForGS,
            grainSteelToCraft, coalForSteel, saburraPowderForSteel, reqGrainSteelToBake
        };
    }

    function calculateMaxFromBank() {
        let low = 0;
        let high = 1000000000;
        let maxSteel = 0;

        while (low <= high) {
            let mid = Math.floor((low + high) / 2);
            let c = getCalculations(mid);
            
            // The limiting factor for crafting Steel is strictly the Metal pipeline.
            // All metal shortfalls (Grain Steel -> Pig Iron -> Blood Ore) cascade down to Granum.
            if (c.defGranum === 0) {
                maxSteel = mid;
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }
        
        const mode = document.getElementById('displayMode').value;
        let finalVal = mode === 'stacks' ? maxSteel / 10000 : maxSteel;
        
        document.getElementById('steelInput').value = mode === 'stacks' ? parseFloat(finalVal.toFixed(4)) : finalVal;
        calculate(); 
    }

    function calculate() {
        let desiredSteelInput = Number(document.getElementById('steelInput').value) || 0;
        let crafters = Math.max(1, parseInt(document.getElementById('crafterCount').value) || 1);
        
        const mode = document.getElementById('displayMode').value;
        const desiredSteel = mode === 'stacks' ? desiredSteelInput * 10000 : desiredSteelInput;

        const pGranum = Number(document.getElementById('priceGranum').value) || 0;
        const pCalx = Number(document.getElementById('priceCalx').value) || 0;
        const pSaburra = Number(document.getElementById('priceSaburra').value) || 0;
        const pWater = Number(document.getElementById('priceWater').value) || 0;

        const t = text[currentLang];
        const c = getCalculations(desiredSteel);

        const defCost = (c.defGranum / 10000) * pGranum + 
                        (c.defCalx / 10000) * pCalx + 
                        (c.defSaburra / 10000) * pSaburra + 
                        (c.defWater / 10000) * pWater;
        
        const costPerSteelStack = (defCost / (desiredSteel / 10000)) || 0;

        // Save data for Export/Discord
        lastCalcData = { desiredSteel, crafters, defCost, ...c };

        // DYNAMIC RAW MATERIALS GRID
        let matsHTML = '';
        let matCount = 0;
        const makeGridCol = (matName, req, bank, def) => `
            <div class="summary-col">
                <div class="req-val">${formatAmount(req)} <span style="font-size:0.6em;color:var(--text-dim)">${t.req}</span></div>
                <div class="bank-val">- ${formatAmount(bank)} <span style="font-size:0.6em;color:var(--text-dim)">${t.bank}</span></div>
                <div class="def-val">${formatAmount(def)} <span style="font-size:0.6em;color:var(--text-dim)">${t.def}</span></div>
                <div class="mat-label">${matName}</div>
            </div>`;

        if (c.reqGranum > 0) { matsHTML += makeGridCol(t.granum, c.reqGranum, c.bGranum, c.defGranum); matCount++; }
        if (c.reqCalx > 0) { matsHTML += makeGridCol(t.calx, c.reqCalx, c.bCalx, c.defCalx); matCount++; }
        if (c.reqSaburra > 0) { matsHTML += makeGridCol(t.saburra, c.reqSaburra, c.bSaburra, c.defSaburra); matCount++; }
        if (c.reqWater > 0) { matsHTML += makeGridCol(t.water, c.reqWater, c.bWater, c.defWater); matCount++; }

        if (desiredSteel <= 0) {
            matsHTML = `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-dim); font-style: italic; padding: 20px;">${t.awaiting}</div>`;
        } else if (matCount === 0) {
            matsHTML = `<div style="grid-column: 1 / -1; text-align: center; color: var(--success); font-weight: bold; padding: 20px;">${t.noMats}</div>`;
        }
        
        document.getElementById('rawMaterials').style.gridTemplateColumns = matCount > 0 && desiredSteel > 0 ? `repeat(${matCount}, 1fr)` : '1fr';
        document.getElementById('rawMaterials').innerHTML = matsHTML;
        
        document.getElementById('costSummary').innerHTML = `
            <div class="cost-item">
                <div style="font-size: 0.8em; color: var(--text-dim); text-transform: uppercase;">${t.totalCost}</div>
                <div class="cost-value">${defCost.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})} ${t.gold}</div>
            </div>
            <div class="cost-item">
                <div style="font-size: 0.8em; color: var(--text-dim); text-transform: uppercase;">${t.costPerSteelStack}</div>
                <div class="cost-value">${costPerSteelStack.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})} ${t.gold}</div>
            </div>
        `;

        // DYNAMIC STEPS LOGIC 
        const split = (val) => Math.ceil(val / crafters).toLocaleString();
        const crftTag = crafters > 1 ? `<span style="color:var(--warning); font-size:0.9em;">${t.perCrafter}</span>` : '';
        let stepsHTML = '';
        let stepNum = 1;

        if (desiredSteel > 0) {
            if (c.saburraPowderToCraft > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.grind} <span class="highlight">${split(c.reqSaburra)} ${t.saburra}</span> + <span class="highlight">${split(c.waterForSaburra)} ${t.water}</span> &#8594; ${t.yields} ${split(c.saburraPowderToCraft)} ${t.sabPowder}</div>`;
                stepNum++;
            }
            if (c.calxToGrind > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.grind} <span class="highlight">${split(c.calxToGrind)} ${t.calx}</span> + <span class="highlight">${split(c.waterForCalx)} ${t.water}</span> &#8594; ${t.yields} ${split(c.calxPowderToCraft)} ${t.calxPowder} ${t.and} ${split(c.coalFromGrinding)} ${t.coal}</div>`;
                stepNum++;
            }
            if (c.calxToCrush > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.crush} <span class="highlight">${split(c.calxToCrush)} ${t.calx}</span> &#8594; ${t.yields} ${split(c.extraCoalNeeded)} ${t.coal}</div>`;
                stepNum++;
            }
            if (c.reqBloodOreToSmelt > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.attractor}: <span class="highlight">${split(c.reqGranum)} ${t.granum}</span> + <span class="highlight">${split(c.calxPowderForBloodOre)} ${t.calxPowder}</span> &#8594; ${t.yields} ${split(c.reqBloodOreToSmelt)} ${t.bloodOre}</div>`;
                stepNum++;
            }
            if (c.cokeToCraft > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.furnace}: <span class="highlight">${split(c.coalForCoke)} ${t.coal}</span> + <span class="highlight">${split(c.calxPowderForCoke)} ${t.calxPowder}</span> &#8594; ${t.yields} ${split(c.cokeToCraft)} ${t.coke}</div>`;
                stepNum++;
            }
            if (c.pigIronToCraft > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.furnace}: <span class="highlight">${split(c.reqBloodOreToSmelt)} ${t.bloodOre}</span> + <span class="highlight">${split(c.cokeForPI)} ${t.coke}</span> &#8594; ${t.yields} ${split(c.pigIronToCraft)} ${t.pigIron}</div>`;
                stepNum++;
            }
            if (c.grainSteelToCraft > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.oven}: <span class="highlight">${split(c.pigIronToCraft)} ${t.pigIron}</span> + <span class="highlight">${split(c.cokeForGS)} ${t.coke}</span> + <span class="highlight">${split(c.calxPowderForGS)} ${t.calxPowder}</span> &#8594; ${t.yields} ${split(c.grainSteelToCraft)} ${t.grainSteel}</div>`;
                stepNum++;
            }
            if (c.reqGrainSteelToBake > 0) {
                stepsHTML += `<div class="step-card"><strong>${t.step} ${stepNum} ${crftTag}:</strong> ${t.oven}: <span class="highlight">${split(c.reqGrainSteelToBake)} ${t.grainSteel}</span> + <span class="highlight">${split(c.coalForSteel)} ${t.coal}</span> + <span class="highlight">${split(c.saburraPowderForSteel)} ${t.sabPowder}</span> &#8594; ${t.yields} ${split(desiredSteel)} ${t.steel}</div>`;
            }
        }
        
        document.getElementById('stepList').innerHTML = stepsHTML;
    }

    function copyToDiscord() {
        const d = lastCalcData;
        const s = (val) => Math.ceil(val / d.crafters).toLocaleString();
        const stk = (val) => (val/10000).toFixed(2);
        
        let msg = `**⚔️ Quartermaster Logistics Order ⚔️**\n`;
        msg += `**Target:** ${d.desiredSteel.toLocaleString()} Steel\n`;
        msg += `**Crafters Assigned:** ${d.crafters}\n\n`;
        
        msg += `**🛒 Deficit to Gather:**\n\`\`\`\n`;
        let defCount = 0;
        if (d.reqGranum > 0) { msg += `- Granum:  ${d.defGranum.toLocaleString()} (${stk(d.defGranum)} Stacks)\n`; defCount++; }
        if (d.reqCalx > 0) { msg += `- Calx:    ${d.defCalx.toLocaleString()} (${stk(d.defCalx)} Stacks)\n`; defCount++; }
        if (d.reqSaburra > 0) { msg += `- Saburra: ${d.defSaburra.toLocaleString()} (${stk(d.defSaburra)} Stacks)\n`; defCount++; }
        if (d.reqWater > 0) { msg += `- Water:   ${d.defWater.toLocaleString()} (${stk(d.defWater)} Stacks)\n`; defCount++; }
        if (defCount === 0 || d.desiredSteel === 0) { msg += `No raw materials needed!\n`; }
        msg += `\`\`\`\n`;

        if (d.desiredSteel > 0) {
            msg += `**⚙️ Instructions ${d.crafters > 1 ? '(Per Crafter)' : ''}:**\n`;
            let dStepNum = 1;
            if (d.saburraPowderToCraft > 0) { msg += `**${dStepNum}.** Grind ${s(d.reqSaburra)} Saburra + ${s(d.waterForSaburra)} Water\n`; dStepNum++; }
            if (d.calxToGrind > 0) { msg += `**${dStepNum}.** Grind ${s(d.calxToGrind)} Calx + ${s(d.waterForCalx)} Water\n`; dStepNum++; }
            if (d.calxToCrush > 0) { msg += `**${dStepNum}.** Crush ${s(d.calxToCrush)} Calx\n`; dStepNum++; }
            if (d.reqBloodOreToSmelt > 0) { msg += `**${dStepNum}.** Attractor: ${s(d.reqGranum)} Granum + ${s(d.calxPowderForBloodOre)} Calx Pwdr\n`; dStepNum++; }
            if (d.cokeToCraft > 0) { msg += `**${dStepNum}.** Furnace: ${s(d.coalForCoke)} Coal + ${s(d.calxPowderForCoke)} Calx Pwdr\n`; dStepNum++; }
            if (d.pigIronToCraft > 0) { msg += `**${dStepNum}.** Furnace: ${s(d.reqBloodOreToSmelt)} Blood Ore + ${s(d.cokeForPI)} Coke\n`; dStepNum++; }
            if (d.grainSteelToCraft > 0) { msg += `**${dStepNum}.** Oven: ${s(d.pigIronToCraft)} Pig Iron + ${s(d.cokeForGS)} Coke + ${s(d.calxPowderForGS)} Calx Pwdr\n`; dStepNum++; }
            if (d.reqGrainSteelToBake > 0) { msg += `**${dStepNum}.** Oven: ${s(d.reqGrainSteelToBake)} Grain Steel + ${s(d.coalForSteel)} Coal + ${s(d.saburraPowderForSteel)} Saburra Pwdr\n`; }
        }

        navigator.clipboard.writeText(msg).then(() => {
            const btn = document.getElementById('btnDiscord');
            const originalText = btn.innerText;
            btn.innerText = text[currentLang].copied;
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        });
    }

    function exportCSV() {
        const d = lastCalcData;
        const dateStr = new Date().toISOString().split('T')[0];
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Date,Target Steel,Crafters,Deficit Granum,Deficit Calx,Deficit Saburra,Deficit Water,Total Deficit Cost (g)\n";
        csvContent += `${dateStr},${d.desiredSteel},${d.crafters},${d.defGranum},${d.defCalx},${d.defSaburra},${d.defWater},${d.defCost.toFixed(2)}\n`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Steel_Logistics_${dateStr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    updateInputSuffixes();
    calculate();
</script>
